<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Citizenship Test · Choose Language</title>
    <meta name="description" content="Practice all 300 questions of the German citizenship test (Einbürgerungstest / Leben in Deutschland) in English or Urdu.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4ff;
            --text: #1e293b;
            --muted: #475569;
            --card-bg: #ffffff;
            --card-shadow: 0 1rem 3rem rgba(15, 23, 42, 0.08);
            --primary: #1d4ed8;
            --primary-hover: #1e40af;
            --accent: #047857;
            --accent-hover: #065f46;
            --border: #e2e8f0;
        }
        [data-bs-theme="dark"] {
            --bg: #0b1121;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --card-bg: #111827;
            --card-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.45);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --accent-hover: #059669;
            --border: #1f2937;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .picker-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            box-shadow: var(--card-shadow);
            padding: 3rem 2.5rem;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }
        .picker-card h1 {
            font-weight: 800;
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
        }
        .picker-card .lede {
            color: var(--muted);
            margin-bottom: 2.25rem;
        }
        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.75rem;
            border: 0;
            color: #fff;
            transition: transform 0.15s ease, background 0.2s ease;
        }
        .lang-btn:hover {
            transform: translateY(-2px);
            color: #fff;
        }
        .lang-btn.en { background: var(--primary); }
        .lang-btn.en:hover { background: var(--primary-hover); }
        .lang-btn.ur {
            background: var(--accent);
            font-family: 'Noto Nastaliq Urdu', 'Inter', serif;
            font-size: 1.35rem;
        }
        .lang-btn.ur:hover { background: var(--accent-hover); }
        .flag { font-size: 1.5rem; }
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 999px;
            width: 2.5rem;
            height: 2.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--muted);
            font-size: 0.875rem;
        }
        footer a { color: var(--primary); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">🌓</button>

    <main class="hero">
        <div class="picker-card">
            <h1>German Citizenship Test</h1>
            <p class="lede">Choose your language / اپنی زبان منتخب کریں</p>

            <div class="d-grid gap-3">
                <a href="en/index.html" class="lang-btn en" data-lang="en">
                    <span class="flag">🇬🇧</span>
                    <span>Continue in English</span>
                </a>
                <a href="ur/index.html" class="lang-btn ur" data-lang="ur" dir="rtl">
                    <span class="flag">🇵🇰</span>
                    <span>اردو میں جاری رکھیں</span>
                </a>
            </div>

            <p class="lede mt-4 mb-0" style="font-size: 0.875rem;">
                All 300 questions · 16 states · free &amp; open source
            </p>
        </div>
    </main>

    <footer>
        <a href="https://github.com/abdullahbutt/german-citizenship-test-english-urdu" target="_blank" rel="noopener">View on GitHub</a>
    </footer>

    <script>
        // Remember language choice
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                try { localStorage.setItem('preferredLang', btn.dataset.lang); } catch (e) {}
            });
        });

        // Auto-redirect on repeat visits (only if no ?stay param)
        (function () {
            if (new URLSearchParams(location.search).has('stay')) return;
            try {
                const pref = localStorage.getItem('preferredLang');
                if (pref === 'en' || pref === 'ur') {
                    location.replace(pref + '/index.html');
                }
            } catch (e) {}
        })();

        // Theme toggle
        const root = document.documentElement;
        const saved = (function () { try { return localStorage.getItem('theme'); } catch (e) { return null; } })();
        if (saved) root.setAttribute('data-bs-theme', saved);
        document.getElementById('themeToggle').addEventListener('click', () => {
            const next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-bs-theme', next);
            try { localStorage.setItem('theme', next); } catch (e) {}
        });
    </script>
</body>
</html>
